services:
  # 1. Spin up a free Postgres Database automatically
  - type: pserv
    name: chronos-database
    plan: free
    postgresMajorVersion: 15

  # 2. Spin up the FastAPI Web Server automatically
  - type: web
    name: chronos-backend
    env: docker
    plan: free
    envVars:
      # Automatically pass the database URL to your Python code!
      - key: DATABASE_URL
        fromDatabase:
          name: chronos-database
          property: connectionString