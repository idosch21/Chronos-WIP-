<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity Tracker</title>
    <script src="chart.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f4f4f9; 
            margin: 0;
            padding: 20px;
        }

        .container { 
            width: 90%; 
            max-width: 650px; 
            margin-top: 20px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
        }

        .controls {
            margin-top: 60px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .view-btn { background-color: #e0e0e0; color: #333; }
        .view-btn:hover { background-color: #d0d0d0; }

        input[type="date"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        
        #refresh-btn {
            margin-top: 20px;
            background-color: #36A2EB;
            color: white;
            width: 100%;
        }
        #refresh-btn:hover { background-color: #2980b9; }

        .header-group {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 30px;
        }

        h1 { color: #333; margin: 0; font-size: 1.5rem; }
        
        #total-time-display {
            font-size: 1.1rem;
            color: #666;
            font-weight: 400;
            background: #eee;
            padding: 4px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }  
        #timelineChart {
            margin-top: 20px;
            max-height: 300px; /* Keep it shorter than the doughnut for better hierarchy */
        }

        /* Status Indicator Styling */
        #status-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
            font-weight: 600;
        }

        #status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            margin-right: 10px;
            transition: background-color 0.3s ease;
        }

        .online { background-color: #4CAF50 !important; }
        .offline { background-color: #f44336 !important; }

        #no-data-msg {
            color: #999;
            font-style: italic;
            margin: 50px 0;
            display: none;
        }

        canvas { max-width: 100%; height: auto !important; }
    </style>
</head>
<body>
    
    <div id="status-container">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
    </div>

    <div class="controls">
        <button id="btn-today" class="view-btn">Today</button>
        <button id="btn-all" class="view-btn">All-Time</button>
        <input type="date" id="date-picker">
    </div>

    <div class="container">
        <div class="header-group">
            <h1 id="chart-title">Today's Activity</h1>
            <span id="total-time-display">Total: 0h 0m 0s</span>
        </div>
    
        <p id="no-data-msg">No activity recorded for this period.</p>
    
        <canvas id="myChart"></canvas> <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <h3 id="timeline-title" style="color: #333; margin-bottom: 20px;">Activity Timeline (24h)</h3>
        <canvas id="timelineChart"></canvas> <button id="refresh-btn">Refresh Data</button>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
